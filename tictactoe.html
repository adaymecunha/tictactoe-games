<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    .status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #a8dadc;
    }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px rgba(233, 69, 96, 0.5);
    }

    .controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    button {
      padding: 0.6rem 1.6rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }

    button:active {
      transform: scale(0.96);
    }

    #resetBtn {
      background: #e94560;
      color: #fff;
    }

    #resetBtn:hover {
      background: #c73652;
    }

    .mode-toggle {
      display: flex;
      gap: 0.5rem;
    }

    .mode-btn {
      background: #16213e;
      color: #a8dadc;
      border: 2px solid #a8dadc;
    }

    .mode-btn.active {
      background: #a8dadc;
      color: #1a1a2e;
    }

    .mode-btn:hover {
      opacity: 0.85;
    }

    .scores {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      min-width: 80px;
    }

    .score-box .label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-box .value {
      font-size: 1.6rem;
      font-weight: bold;
    }

    .score-box.x .value { color: #e94560; }
    .score-box.o .value { color: #a8dadc; }
    .score-box.draw .value { color: #888; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div class="scores">
    <div class="score-box x">
      <div class="label">X</div>
      <div class="value" id="scoreX">0</div>
    </div>
    <div class="score-box draw">
      <div class="label">Draws</div>
      <div class="value" id="scoreDraw">0</div>
    </div>
    <div class="score-box o">
      <div class="label">O</div>
      <div class="value" id="scoreO">0</div>
    </div>
  </div>

  <div class="status" id="status">X's turn</div>

  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div class="controls">
    <div class="mode-toggle">
      <button class="mode-btn active" id="pvpBtn" onclick="setMode('pvp')">2 Players</button>
      <button class="mode-btn" id="aiBtn" onclick="setMode('ai')">vs AI</button>
    </div>
    <button id="resetBtn" onclick="reset()">New Game</button>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    let mode = 'pvp';
    let scores = { X: 0, O: 0, draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    cells.forEach(cell => cell.addEventListener('click', () => handleClick(+cell.dataset.i)));

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (mode === 'ai' && current === 'O') return;
      play(i);
      if (mode === 'ai' && !gameOver) {
        setTimeout(aiMove, 350);
      }
    }

    function play(i) {
      board[i] = current;
      const cell = cells[i];
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const win = checkWin();
      if (win) {
        win.forEach(idx => cells[idx].classList.add('win'));
        status.textContent = `${current} wins!`;
        scores[current]++;
        updateScores();
        gameOver = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.draw++;
        updateScores();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = mode === 'ai' && current === 'O' ? "AI is thinking..." : `${current}'s turn`;
      }
    }

    function checkWin() {
      return WINS.find(([a,b,c]) => board[a] && board[a] === board[b] && board[a] === board[c]) || null;
    }

    function aiMove() {
      const move = bestMove();
      if (move !== -1) play(move);
    }

    function bestMove() {
      // Try to win
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          if (checkWin()) { board[i] = null; return i; }
          board[i] = null;
        }
      }
      // Block X from winning
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'X';
          if (checkWin()) { board[i] = null; return i; }
          board[i] = null;
        }
      }
      // Take center
      if (!board[4]) return 4;
      // Take a corner
      const corners = [0,2,6,8].filter(i => !board[i]);
      if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
      // Take any edge
      const edges = [1,3,5,7].filter(i => !board[i]);
      if (edges.length) return edges[Math.floor(Math.random() * edges.length)];
      return -1;
    }

    function setMode(m) {
      mode = m;
      document.getElementById('pvpBtn').classList.toggle('active', m === 'pvp');
      document.getElementById('aiBtn').classList.toggle('active', m === 'ai');
      reset();
    }

    function reset() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
      status.textContent = `${current}'s turn`;
    }

    function updateScores() {
      document.getElementById('scoreX').textContent = scores.X;
      document.getElementById('scoreO').textContent = scores.O;
      document.getElementById('scoreDraw').textContent = scores.draw;
    }
  </script>
</body>
</html>
